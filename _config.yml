# ---------------- Basic Site Settings ----------------
locale        : "en-US"
site_theme    : "air"                            # "default" or "air"
title         : "Yurii Halychanskyi"
title_separator: "·"
name          : &name "Yurii Halychanskyi"
description   : &description "PhD student at UIUC — speech, accent conversion, and generative audio."
url           : https://yhalyc.github.io       # user site -> root domain
baseurl       : ""                               # IMPORTANT: keep empty for user sites
repository    : "yhalyc/yhalyc.github.io"

# ---------------- Author (sidebar content hidden globally below) -------------
author:
  avatar      : "images/profile.jpg"             # put your headshot here
  name        : "Yurii Halychanskyi"
  bio         : ""                               # (not shown)
  email       : "yhalyc [AT] illinois [DOT] edu"

  # Minimal profiles (leave blank to hide icons)
  github      : "yhalyc"
  googlescholar: ""       # add later if you want
  linkedin    : ""        # add later if you want
  twitter     : ""        # add later if you want

# ---------------- Headings for publications (if you add items later) ---------
publication_category:
  conferences: { title: "Conference Papers" }
  manuscripts: { title: "Journal Articles" }

# ---------------- Site behavior ---------------------------------------------
breadcrumbs   : false
words_per_minute: 160
future        : true
read_more     : "disabled"
atom_feed:
  hide        : true

comments:
  provider    : false

# ---------------- Analytics (off) -------------------------------------------
analytics:
  provider    : "false"

# ---------------- Include/Exclude -------------------------------------------
include:
  - _pages
  - files
exclude:
  - node_modules
  - vendor
  - README
  - Gemfile*
  - package.json*
keep_files:
  - .git

encoding     : "utf-8"
markdown_ext : "markdown,mkdown,mkdn,mkd,md"

# ---------------- Markdown / Build ------------------------------------------
markdown     : kramdown
highlighter  : rouge
kramdown:
  input      : GFM
  hard_wrap  : false

# ---------------- Collections (kept minimal; you can add later) -------------
collections:
  publications: { output: true, permalink: /:collection/:path/ }

# ---------------- Defaults (NO SIDEBAR) -------------------------------------
defaults:
  # all pages use single layout, and we DISABLE the author sidebar
  - scope: { path: "", type: pages }
    values:
      layout: single
      author_profile: false
  - scope: { path: "", type: publications }
    values:
      layout: single
      author_profile: false

# ---------------- SASS / Output --------------------------------------------
sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
timezone: Etc/UTC

# ---------------- Plugins (keep lean) ---------------------------------------
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-sitemap
  - jemoji

# ---------------- HTML compression ------------------------------------------
compress_html:
  clippings: all
  ignore:
    envs: development
