# ---------------- Basic Site Settings ----------------
locale        : "en-US"
site_theme    : "air"                            # "default" or "air"
title         : "Yurii Halychanskyi"
title_separator: "·"
name          : &name "Yurii Halychanskyi"
description   : &description "PhD student at UIUC — speech, accent conversion, and generative audio."
url           : https://claussss.github.io       # user site -> root domain
baseurl       : ""                               # IMPORTANT: keep empty for user sites
repository    : "claussss/claussss.github.io"

# ---------------- Author (sidebar content hidden globally below) -------------
author:
  avatar      : "images/profile.jpg"             # put your headshot here
  name        : "Yurii Halychanskyi"
  bio         : "PhD student at UIUC focused on generative audio, speech, and accent conversion."                               # (not shown)
  email       : "yuriih2 [AT] illinois [DOT] edu"

  # Minimal profiles (leave blank to hide icons)
  github      : "claussss"
  googlescholar: "https://scholar.google.com/citations?user=Rcx5Jn8AAAAJ"
  linkedin    : "yurii-halychanskyi-a57590169"
  twitter     : "Yurii46278911"

twitter:
  username: "Yurii46278911"

social:
  type: "Person"
  name: "Yurii Halychanskyi"
  links:
    - "https://scholar.google.com/citations?user=Rcx5Jn8AAAAJ"
    - "https://github.com/claussss"
    - "https://www.linkedin.com/in/yurii-halychanskyi-a57590169/"
    - "https://x.com/Yurii46278911"

og_description: "PhD student at UIUC researching generative audio, speech, and accent conversion."
og_image: "profile_final.jpg"

# ---------------- Headings for publications (if you add items later) ---------
publication_category:
  conferences: { title: "Conference Papers" }
  manuscripts: { title: "Journal Articles" }

# ---------------- Site behavior ---------------------------------------------
breadcrumbs   : false
words_per_minute: 160
future        : true
read_more     : "disabled"
atom_feed:
  hide        : true

comments:
  provider    : false

# ---------------- Analytics (off) -------------------------------------------
analytics:
  provider    : "false"

# ---------------- Include/Exclude -------------------------------------------
include:
  - _pages
  - files
exclude:
  - node_modules
  - vendor
  - README
  - Gemfile*
  - package.json*
keep_files:
  - .git

encoding     : "utf-8"
markdown_ext : "markdown,mkdown,mkdn,mkd,md"

# ---------------- Markdown / Build ------------------------------------------
markdown     : kramdown
highlighter  : rouge
kramdown:
  input      : GFM
  hard_wrap  : false

# ---------------- Collections (kept minimal; you can add later) -------------
collections:
  publications: { output: true, permalink: /:collection/:path/ }

# ---------------- Defaults (NO SIDEBAR) -------------------------------------
defaults:
  # all pages use single layout, and we DISABLE the author sidebar
  - scope: { path: "", type: pages }
    values:
      layout: single
      author_profile: false
  - scope: { path: "", type: publications }
    values:
      layout: single
      author_profile: false

# ---------------- SASS / Output --------------------------------------------
sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
timezone: Etc/UTC

# ---------------- Plugins (keep lean) ---------------------------------------
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-sitemap
  - jemoji

# ---------------- HTML compression ------------------------------------------
compress_html:
  clippings: all
  ignore:
    envs: development
